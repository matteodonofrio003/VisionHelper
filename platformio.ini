[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Specifichiamo il tipo di flash e memoria per il modulo WROVER 
board_build.mcu = esp32
board_build.f_cpu = 240000000L

; Requisito 4: Abilitazione PSRAM obbligatoria per evitare MemoryError [cite: 25]
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Configurazione partizioni per app grandi (AI + Camera)
board_build.partitions = huge_app.csv